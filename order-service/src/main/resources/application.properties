server.port=8080
spring.application.name=order-service

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:orderdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# BAD: pool baixo - facil de esgotar sob carga
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false

# URLs dos outros servicos (sobrescritas por env vars no Docker)
inventory.service.url=${INVENTORY_SERVICE_URL:http://localhost:8081}
invoice.service.url=${INVOICE_SERVICE_URL:http://localhost:8082}
notification.service.url=${NOTIFICATION_SERVICE_URL:http://localhost:8083}
